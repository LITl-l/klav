# Japanese syllable rules — Consonant × Vowel → Kana
#
# Layer 1: Algorithmic conversion. No dictionary needed.
# This alone lets you type any Japanese text.

[syllable_rules]
# 母音のみ（あ行）
"" = { "A" = "あ", "I" = "い", "U" = "う", "E" = "え", "O" = "お" }

# か行
"K" = { "A" = "か", "I" = "き", "U" = "く", "E" = "け", "O" = "こ" }

# さ行
"S" = { "A" = "さ", "I" = "し", "U" = "す", "E" = "せ", "O" = "そ" }

# た行
"T" = { "A" = "た", "I" = "ち", "U" = "つ", "E" = "て", "O" = "と" }

# な行
"N" = { "A" = "な", "I" = "に", "U" = "ぬ", "E" = "ね", "O" = "の" }

# は行
"H" = { "A" = "は", "I" = "ひ", "U" = "ふ", "E" = "へ", "O" = "ほ" }

# ま行
"M" = { "A" = "ま", "I" = "み", "U" = "む", "E" = "め", "O" = "も" }

# や行
"Y" = { "A" = "や", "U" = "ゆ", "O" = "よ" }

# ら行
"R" = { "A" = "ら", "I" = "り", "U" = "る", "E" = "れ", "O" = "ろ" }

# わ行
"W" = { "A" = "わ", "O" = "を" }

# 濁音: が行・ざ行・だ行・ば行
"G" = { "A" = "が", "I" = "ぎ", "U" = "ぐ", "E" = "げ", "O" = "ご" }
"Z" = { "A" = "ざ", "I" = "じ", "U" = "ず", "E" = "ぜ", "O" = "ぞ" }
"D" = { "A" = "だ", "I" = "ぢ", "U" = "づ", "E" = "で", "O" = "ど" }
"B" = { "A" = "ば", "I" = "び", "U" = "ぶ", "E" = "べ", "O" = "ぼ" }

# 半濁音: ぱ行
"P" = { "A" = "ぱ", "I" = "ぴ", "U" = "ぷ", "E" = "ぺ", "O" = "ぽ" }

# 濁音修飾（Voiced modifier + base consonant → voiced consonant）
[voiced_rules]
"K" = "G"   # か行 → が行
"S" = "Z"   # さ行 → ざ行
"T" = "D"   # た行 → だ行
"H" = "B"   # は行 → ば行

# 半濁音修飾
[half_voiced_rules]
"H" = "P"   # は行 → ぱ行

# QWERTY keyboard layout for steno input
# Maps physical keys to steno logical keys

[keymap]
# Left hand — consonants (top row)
"KEY_Q" = "S1"
"KEY_W" = "T1"
"KEY_E" = "P1"
"KEY_R" = "H1"

# Left hand — consonants (home row)
"KEY_A" = "S1"    # S is doubled for comfort
"KEY_S" = "K1"
"KEY_D" = "W1"
"KEY_F" = "R1"

# Left thumb — vowels
"KEY_C" = "A"
"KEY_V" = "O"

# Right thumb — vowels
"KEY_N" = "E"
"KEY_M" = "U"

# Right hand — consonants (top row)
"KEY_U" = "F1"
"KEY_I" = "P2"
"KEY_O" = "L1"
"KEY_P" = "T2"

# Right hand — consonants (home row)
"KEY_J" = "R2"
"KEY_K" = "B1"
"KEY_L" = "G1"
"KEY_SEMICOLON" = "S2"

# Modifiers
"KEY_T" = "*"          # Star (disambiguation)
"KEY_Y" = "*"          # Star (mirrored)
"KEY_G" = "VOICED"     # 濁音
"KEY_H" = "HALF_VOICED" # 半濁音

# Special
"KEY_SPACE" = "LANG"   # Language switch
"KEY_BACKSPACE" = "UNDO"
